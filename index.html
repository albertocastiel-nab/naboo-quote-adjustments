<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quotes adjustments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:rgb(247,247,247); --fg:rgb(31,35,33); --card:#fff;
    --border:rgb(231,230,228); --muted:rgb(245,245,243); --muted-fg:rgb(140,140,138);
    --primary:rgb(182,219,102); --primary-strong:rgb(165,205,79);
    --primary-soft:rgba(182,219,102,.25);
    --warning:hsl(32 90% 45%); --dest:hsl(0 72% 51%);
    --radius:12px; --radius-sm:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:15px/1.55 'DM Sans','Aeonik',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  header{padding:16px 30px;background:var(--card);border-bottom:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{display:inline-flex;align-items:center;color:var(--fg);line-height:0}
  .logo svg{height:22px;width:auto;display:block}
  .langsel{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden;background:var(--card)}
  .langsel button{background:transparent;border:none;color:var(--muted-fg);padding:6px 16px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
  .langsel button.active{background:var(--primary);color:var(--fg)}
  main{max-width:1000px;margin:0 auto;padding:36px 30px 96px}
  .pagehead{text-align:center;margin-bottom:30px}
  .pagehead h1{font-size:32px;font-weight:500;letter-spacing:-.02em;margin:0 0 8px}
  .pagehead p{font-size:15px;color:var(--muted-fg);margin:0 auto;max-width:620px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:740px){.grid{grid-template-columns:1fr}}
  .dz{background:var(--card);border:1.5px dashed var(--border);border-radius:var(--radius);
    padding:28px 24px;text-align:center;cursor:pointer;transition:border-color .15s}
  .dz:hover{border-color:var(--primary)}
  .dz.over{border-color:var(--primary-strong);background:hsl(79 62% 97%)}
  .dz .ic{width:40px;height:40px;border-radius:50%;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
  .dz .ic svg{width:18px;height:18px;stroke:var(--fg)}
  .dz h3{margin:0 0 6px;font-size:15px;font-weight:500}
  .dz .hint{font-size:13px;color:var(--muted-fg)}
  .files{list-style:none;margin:14px 0 0;padding:0;text-align:left}
  .files li{display:flex;justify-content:space-between;align-items:center;background:var(--muted);border-radius:10px;padding:7px 12px;margin-bottom:6px;font-size:13px}
  .files .rm{background:none;border:none;cursor:pointer;font-size:17px;line-height:1;color:var(--muted-fg);padding:0 2px}
  .files .rm:hover{color:var(--dest)}
  .bar{display:flex;gap:12px;align-items:center;margin-top:26px;flex-wrap:wrap;justify-content:center}
  .btn{background:var(--primary);color:var(--fg);border:none;height:52px;padding:0 48px;border-radius:999px;
    font:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:background .15s;min-width:220px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px}
  .btn:hover{background:var(--primary-strong)}
  .btn:disabled{background:var(--primary);color:var(--fg);cursor:default;opacity:.7}
  .btn.ghost{background:var(--card);color:var(--fg);border:1px solid var(--border);min-width:0;height:38px;padding:0 16px;font-size:13px}
  .btn.ghost:hover{background:var(--muted)}
  .err{background:hsl(0 72% 97%);border:1px solid hsl(0 72% 85%);color:var(--dest);border-radius:var(--radius-sm);
    padding:12px 16px;margin-top:16px;font-size:13.5px;font-weight:500;display:none;text-align:center}
  .resbar{display:flex;margin-bottom:22px}
  .result{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 30px;position:relative;overflow:hidden}
  .result::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--muted-fg)}
  .result.ok::before{background:var(--primary-strong)} .result.bad::before{background:var(--dest)} .result.warn::before{background:var(--warning)}
  .result .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;color:var(--muted-fg)}
  .result .big{font-size:30px;font-weight:600;letter-spacing:-.02em;margin:8px 0 4px;line-height:1.15}
  .result.ok .big{color:var(--primary-strong)} .result.bad .big{color:var(--dest)} .result.warn .big{color:var(--warning)}
  .result .note{font-size:14px;color:var(--muted-fg)}
  .nums{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
  @media(max-width:560px){.nums{grid-template-columns:1fr}}
  .numcard{border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px}
  .numcard .k{font-size:12px;color:var(--muted-fg)} .numcard .v{font-size:20px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:4px}
  .supplier{margin-top:18px;font-size:14px} .supplier b{font-weight:600}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(31,35,33,.25);border-top-color:var(--fg);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hide{display:none!important}
  .footns{font-size:12px;color:var(--muted-fg);margin-top:30px;border-top:1px solid var(--border);padding-top:14px;line-height:1.6}
  .feedback{margin-top:26px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);padding:18px 22px;display:flex;flex-wrap:wrap;align-items:center;gap:14px}
  .feedback .fb-q{font-weight:500;font-size:15px}
  .fb-btns{display:flex;gap:8px}
  .fb-thumb{font-size:18px;line-height:1;background:var(--card);border:1px solid var(--border);border-radius:999px;width:42px;height:42px;cursor:pointer;transition:.15s}
  .fb-thumb:hover{background:var(--muted)} .fb-thumb.sel{background:var(--primary-soft);border-color:var(--primary-strong)}
  .fb-reason{flex-basis:100%;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
  .fb-reason textarea{flex:1;min-width:260px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;font-size:14px;color:var(--fg);resize:vertical}
  .fb-reason textarea:focus{outline:none;border-color:var(--primary-strong)}
  .fb-thanks{color:var(--primary-strong);font-weight:500}
</style>
</head>
<body>
<header>
  <a class="logo" href="#" aria-label="Naboo">
    <svg viewBox="0 0 5868 1800" xmlns="http://www.w3.org/2000/svg" role="img">
      <g transform="translate(0,1800) scale(0.1,-0.1)" fill="currentColor" stroke="none">
        <path d="M25870 17928 c-693 -636 -1535 -1107 -2420 -1358 -127 -35 -395 -98 -492 -115 l-38 -6 0 -8114 0 -8115 1510 0 1510 0 0 2132 c0 1178 4 2128 9 2123 4 -6 16 -66 25 -135 83 -605 265 -1300 489 -1864 514 -1299 1310 -2121 2301 -2381 444 -116 962 -121 1513 -14 1153 224 2166 977 2845 2114 645 1081 982 2487 955 3985 -10 511 -43 890 -117 1355 -289 1795 -1097 3178 -2287 3911 -523 322 -1100 515 -1733 578 -685 69 -1246 -17 -1755 -268 -487 -241 -887 -601 -1231 -1111 -481 -712 -829 -1720 -984 -2850 -6 -44 -14 -91 -18 -105 -4 -14 -9 2298 -12 5136 l-5 5161 -65 -59z m3005 -6333 c473 -83 918 -509 1273 -1220 435 -871 687 -2031 774 -3560 16 -289 16 -1291 0 -1585 -85 -1514 -325 -2649 -746 -3515 -186 -383 -370 -650 -602 -876 -205 -198 -402 -314 -631 -371 -114 -28 -325 -30 -456 -5 -986 195 -1859 1427 -2266 3197 -171 743 -251 1506 -251 2385 1 2434 598 4295 1653 5148 378 306 879 467 1252 402z"/>
        <path d="M6651 12040 c-870 -50 -1539 -279 -2110 -723 -135 -105 -372 -341 -485 -482 -103 -129 -269 -377 -351 -524 -290 -522 -504 -1184 -635 -1966 -22 -132 -42 -244 -44 -250 -3 -5 -5 858 -5 1918 l-1 1929 -60 -54 c-376 -334 -620 -516 -986 -736 -569 -342 -1256 -605 -1839 -704 l-135 -23 0 -5102 0 -5103 1510 0 1510 0 0 3353 c0 2863 2 3383 15 3562 124 1757 560 3045 1275 3764 311 313 634 495 1029 578 112 24 148 27 331 27 177 0 219 -3 310 -22 144 -32 287 -90 400 -163 123 -79 284 -240 369 -369 244 -369 399 -928 465 -1680 39 -442 39 -408 43 -4782 l4 -4268 1520 0 1519 0 -3 3978 c-3 4290 0 4048 -52 4495 -173 1484 -735 2494 -1665 2989 -342 183 -731 296 -1178 343 -176 19 -553 26 -751 15z"/>
        <path d="M16070 12013 c-667 -46 -1111 -126 -1610 -293 -834 -277 -1482 -730 -1868 -1305 -439 -653 -489 -1387 -141 -2084 113 -228 226 -395 407 -603 80 -93 86 -98 123 -98 23 0 41 5 43 13 2 6 16 91 31 187 108 709 302 1410 546 1974 523 1208 1307 1921 2291 2085 368 61 765 51 1075 -29 767 -198 1239 -812 1403 -1823 63 -386 72 -645 68 -1932 l-3 -1049 -1415 -152 c-778 -83 -1482 -161 -1565 -173 -1455 -209 -2579 -707 -3248 -1440 -601 -658 -848 -1505 -711 -2446 102 -703 374 -1286 814 -1739 477 -492 1124 -818 1955 -985 568 -114 1323 -149 1835 -86 1209 150 1968 835 2260 2039 38 154 90 443 90 495 0 59 13 1 30 -140 195 -1546 1012 -2298 2618 -2408 85 -6 205 -11 268 -11 l114 0 -3 4387 c-2 4144 -4 4396 -20 4528 -10 77 -29 201 -43 275 -258 1408 -1309 2312 -3094 2659 -407 79 -825 127 -1325 151 -188 9 -810 11 -925 3z m2368 -6808 c3 -1822 -1 -2081 -38 -2407 -164 -1434 -839 -2330 -1856 -2463 -452 -59 -808 49 -1111 338 -176 169 -287 326 -418 592 -206 419 -329 904 -397 1565 -21 201 -17 923 5 1130 87 795 305 1404 672 1877 431 557 1024 868 1835 963 96 11 384 47 640 80 614 78 611 78 640 76 l25 -1 3 -1750z"/>
        <path d="M40505 11963 c-22 -1 -103 -7 -180 -13 -690 -53 -1429 -259 -2080 -581 -1145 -565 -2063 -1477 -2688 -2669 -950 -1812 -980 -3876 -81 -5609 197 -380 425 -722 710 -1066 136 -164 520 -549 683 -685 277 -229 661 -493 890 -609 l41 -22 20 47 c11 25 20 47 20 49 0 1 -39 31 -87 66 -117 84 -292 261 -375 379 -165 234 -273 518 -323 850 -35 230 -30 636 11 960 112 886 517 2103 1197 3600 794 1749 1495 2972 2163 3775 138 166 488 516 624 625 343 273 684 435 1035 492 183 29 465 11 664 -43 40 -11 75 -18 77 -17 1 2 12 24 22 49 l20 46 -126 45 c-528 189 -1005 290 -1562 328 -131 9 -576 11 -675 3z"/>
        <path d="M52770 11964 c-423 -29 -761 -81 -1125 -174 -1568 -401 -2880 -1420 -3712 -2883 -977 -1719 -1116 -3696 -381 -5422 495 -1161 1369 -2143 2440 -2739 l67 -37 21 40 c11 22 20 44 20 49 0 5 -35 36 -77 68 -407 303 -627 695 -710 1259 -21 148 -24 601 -5 770 64 563 187 1084 418 1775 292 871 792 2035 1369 3185 576 1147 1080 1962 1590 2575 161 193 462 495 620 622 384 308 744 469 1135 508 173 18 425 -6 585 -55 28 -8 53 -15 57 -15 7 0 51 91 46 95 -2 2 -70 27 -153 57 -475 174 -988 280 -1535 318 -130 9 -555 11 -670 4z"/>
        <path d="M43420 11270 c-13 -28 -22 -51 -19 -53 2 -2 40 -30 84 -62 44 -32 134 -112 201 -179 288 -289 449 -652 505 -1136 16 -136 16 -521 0 -675 -75 -730 -289 -1518 -696 -2565 -399 -1025 -1037 -2383 -1563 -3325 -643 -1153 -1261 -1951 -1851 -2388 -214 -159 -468 -290 -690 -356 -166 -50 -278 -65 -471 -65 -179 0 -267 11 -428 53 l-73 19 -25 -49 -24 -49 24 -10 c474 -180 929 -288 1456 -347 207 -23 899 -26 1100 -5 588 62 1112 188 1630 394 211 84 583 266 775 378 1181 694 2076 1761 2610 3109 211 533 348 1080 409 1631 54 481 45 1033 -25 1515 -151 1050 -600 2059 -1279 2875 -446 535 -948 953 -1581 1313 l-46 26 -23 -49z"/>
        <path d="M55681 11268 c-18 -43 -19 -53 -7 -60 45 -26 204 -159 279 -235 279 -283 436 -632 499 -1113 16 -124 16 -581 0 -730 -108 -971 -491 -2159 -1215 -3760 -1233 -2729 -2271 -4225 -3272 -4715 -386 -190 -760 -239 -1145 -151 -58 13 -113 27 -123 31 -14 6 -21 -2 -38 -40 -12 -28 -17 -51 -12 -56 17 -17 285 -110 472 -164 314 -90 632 -152 991 -192 206 -23 899 -26 1100 -5 763 79 1421 268 2075 594 931 466 1725 1175 2307 2063 628 956 995 2032 1069 3128 23 354 4 876 -47 1227 -156 1088 -611 2096 -1332 2950 -123 146 -462 486 -612 614 -268 229 -600 460 -911 634 l-56 32 -22 -52z"/>
      </g>
    </svg>
  </a>
  <div class="langsel">
    <button id="lang_en" class="active" onclick="setLang('en')">EN</button>
    <button id="lang_fr" onclick="setLang('fr')">FR</button>
  </div>
</header>
<main>
  <section id="importView">
    <div class="pagehead">
      <h1 id="h_title">Quotes adjustments</h1>
      <p id="h_sub"></p>
    </div>
    <div class="grid">
      <div class="dz" id="dzQuote">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h6"/></svg></div>
        <h3 id="h_quote">Naboo Quote</h3>
        <div class="hint" id="h_quoteHint"></div>
        <ul class="files" id="filesQuote"></ul>
        <input type="file" accept="application/pdf,.pdf" id="fileQuote" hidden multiple />
      </div>
      <div class="dz" id="dzInv">
        <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg></div>
        <h3 id="h_inv">Supplier Invoice</h3>
        <div class="hint" id="h_invHint"></div>
        <ul class="files" id="filesInv"></ul>
        <input type="file" accept="application/pdf,.pdf" id="fileInv" hidden multiple />
      </div>
    </div>
    <div class="bar">
      <button class="btn" id="btnCompare">Compare</button>
    </div>
    <div class="err" id="err"></div>
  </section>

  <section id="resultView" class="hide">
    <div class="resbar"><button class="btn ghost" id="btnBack">← <span id="h_back">New comparison</span></button></div>
    <div class="result" id="resultCard">
      <div class="lbl" id="h_resultLbl">Result</div>
      <div class="big" id="resultBig">—</div>
      <div class="note" id="resultNote"></div>
      <div class="nums">
        <div class="numcard"><div class="k" id="h_invK">Supplier invoice (TTC)</div><div class="v" id="invVal">—</div></div>
        <div class="numcard"><div class="k" id="h_quoteK">Quoted for this supplier (TTC)</div><div class="v" id="quoteVal">—</div></div>
      </div>
      <div class="supplier" id="supplierLine"></div>
    </div>

    <div class="feedback" id="feedback">
      <span class="fb-q" id="fb_q">Was this useful?</span>
      <div class="fb-btns">
        <button class="fb-thumb" id="fb_up" type="button" aria-label="thumbs up">👍</button>
        <button class="fb-thumb" id="fb_down" type="button" aria-label="thumbs down">👎</button>
      </div>
      <div class="fb-reason hide" id="fb_reason">
        <textarea id="fb_text" rows="3"></textarea>
        <button class="btn ghost" id="fb_send" type="button">Send</button>
      </div>
      <div class="fb-thanks hide" id="fb_thanks"></div>
    </div>

    <div class="footns" id="h_foot"></div>
  </section>
</main>

<script>
if(window.pdfjsLib){ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }

/* ===== i18n ===== */
const I18N={
  en:{title:'Quotes adjustments',
    sub:'Drop the Naboo quote and the supplier invoice (one or more PDFs each), then compare.',
    quote:'Naboo Quote', inv:'Supplier Invoice', hint:'Drag PDFs here or click — multiple files allowed',
    compare:'Compare', back:'New comparison',
    resultLbl:'Result', invK:'Supplier invoice (TTC)', quoteK:'Quoted for this supplier (TTC)',
    analyzing:'Analyzing…', match:'✓ Amounts match', gapHi:'Invoice is {x} higher than quoted', gapLo:'Invoice is {x} lower than quoted',
    supplier:'Supplier:', notFound:'Could not read one of the amounts — open the PDFs and check manually.',
    foot:'The amounts are read by AI from the documents’ TTC totals (per supplier in the quote, grand total on the invoice). Always sanity-check before acting. Scanned PDFs without a text layer are not supported.',
    errFiles:'Add at least one PDF on each side (Naboo quote and supplier invoice).',
    errText:'No text layer found in one of the files (scanned PDF?). OCR is not supported.',
    errKey:'The AI key is not configured on the server yet (ANTHROPIC_API_KEY in Vercel).',
    errGeneric:'Something went wrong reading the documents. Try again.',
    fbQ:'Was this comparison useful?', fbReason:'What went wrong, and why?', fbSend:'Send feedback', fbThanks:'Thanks — your feedback was recorded.'},
  fr:{title:'Ajustement des devis',
    sub:'Déposez le devis Naboo et la facture fournisseur (un ou plusieurs PDF chacun), puis comparez.',
    quote:'Devis Naboo', inv:'Facture fournisseur', hint:'Glissez les PDF ici ou cliquez — plusieurs fichiers possibles',
    compare:'Comparer', back:'Nouvelle comparaison',
    resultLbl:'Résultat', invK:'Facture fournisseur (TTC)', quoteK:'Devis pour ce fournisseur (TTC)',
    analyzing:'Analyse…', match:'✓ Les montants correspondent', gapHi:'La facture est {x} plus élevée que le devis', gapLo:'La facture est {x} plus basse que le devis',
    supplier:'Fournisseur :', notFound:'Impossible de lire un des montants — ouvrez les PDF et vérifiez manuellement.',
    foot:'Les montants sont lus par IA depuis les totaux TTC des documents (par fournisseur dans le devis, total général sur la facture). Vérifiez toujours avant d’agir. Les PDF scannés sans couche texte ne sont pas pris en charge.',
    errFiles:'Ajoutez au moins un PDF de chaque côté (devis Naboo et facture fournisseur).',
    errText:'Couche texte introuvable dans un fichier (PDF scanné ?). L’OCR n’est pas pris en charge.',
    errKey:'La clé IA n’est pas encore configurée sur le serveur (ANTHROPIC_API_KEY dans Vercel).',
    errGeneric:'Un problème est survenu à la lecture des documents. Réessayez.',
    fbQ:'Cette comparaison vous a-t-elle été utile ?', fbReason:'Qu’est-ce qui s’est trompé, et pourquoi ?', fbSend:'Envoyer', fbThanks:'Merci — votre retour a été enregistré.'}
};
let lang='en';
const t=k=>I18N[lang][k];
function setLang(l){ lang=l; document.documentElement.lang=l;
  document.getElementById('lang_en').classList.toggle('active',l==='en');
  document.getElementById('lang_fr').classList.toggle('active',l==='fr');
  applyStatic(); if(lastResult) renderResult(lastResult); }
function applyStatic(){
  const m={h_title:'title',h_sub:'sub',h_quote:'quote',h_inv:'inv',h_quoteHint:'hint',h_invHint:'hint',
    h_back:'back',h_resultLbl:'resultLbl',h_invK:'invK',h_quoteK:'quoteK',h_foot:'foot',fb_q:'fbQ'};
  for(const id in m){ const el=$(id); if(el) el.textContent=t(m[id]); }
  $('btnCompare').textContent=t('compare');
  $('fb_send').textContent=t('fbSend'); $('fb_text').placeholder=t('fbReason'); $('fb_thanks').textContent=t('fbThanks');
  document.title=t('title');
}

/* ===== helpers ===== */
const $=id=>document.getElementById(id);
const state={quote:[],inv:[]};
let lastResult=null;
function fmt(n){ if(n==null||isNaN(n))return '—'; return n.toLocaleString(lang==='fr'?'fr-FR':'en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function eur(n){ return fmt(n)+' €'; }
function esc(s){ return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function round2(n){ return Math.round((n+Number.EPSILON)*100)/100; }
function showErr(m){ const e=$('err'); e.textContent=m; e.style.display='block'; }

/* ===== file inputs ===== */
function wire(dzId,inputId,which,listId){
  const dz=$(dzId),input=$(inputId);
  dz.addEventListener('click',e=>{ if(e.target.classList.contains('rm'))return; input.click(); });
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over'); addFiles([...e.dataTransfer.files],which,listId);});
  input.addEventListener('change',e=>{ addFiles([...e.target.files],which,listId); input.value=''; });
}
function addFiles(files,which,listId){
  $('err').style.display='none';
  files.forEach(f=>{ if(f.type!=='application/pdf'&&!/\.pdf$/i.test(f.name))return;
    if(!state[which].some(x=>x.name===f.name&&x.size===f.size)) state[which].push(f); });
  renderFiles(which,listId);
}
function renderFiles(which,listId){
  const ul=$(listId); ul.innerHTML='';
  state[which].forEach((f,i)=>{ const li=document.createElement('li');
    li.innerHTML=`<span>${esc(f.name)}</span><button class="rm" title="remove">×</button>`;
    li.querySelector('.rm').onclick=ev=>{ ev.stopPropagation(); state[which].splice(i,1); renderFiles(which,listId); };
    ul.appendChild(li); });
}
wire('dzQuote','fileQuote','quote','filesQuote');
wire('dzInv','fileInv','inv','filesInv');

/* ===== pdf text extraction (raw) ===== */
async function extractText(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out=[];
  for(let p=1;p<=pdf.numPages;p++){
    const tc=await (await pdf.getPage(p)).getTextContent();
    const rows={};
    tc.items.forEach(it=>{ if(it.str==null)return; const y=Math.round(it.transform[5]); (rows[y]=rows[y]||[]).push([it.transform[4],it.str]); });
    Object.keys(rows).map(Number).sort((a,b)=>b-a).forEach(y=>{
      out.push(rows[y].sort((a,b)=>a[0]-b[0]).map(p=>p[1]).join(' ').replace(/\s+/g,' ').trim());
    });
  }
  return out.filter(Boolean).join('\n');
}
async function sideText(files){ let txt=''; for(const f of files){ txt+= (txt?'\n\n':'') + await extractText(f); } return txt; }

/* ===== compare ===== */
$('btnCompare').addEventListener('click',async()=>{
  if(!state.quote.length||!state.inv.length){ showErr(t('errFiles')); return; }
  const btn=$('btnCompare'); btn.disabled=true; const old=btn.innerHTML;
  btn.innerHTML='<span class="spinner"></span> '+t('analyzing');
  try{
    const [quoteText,invoiceText]=await Promise.all([sideText(state.quote),sideText(state.inv)]);
    if(quoteText.replace(/\s/g,'').length<20||invoiceText.replace(/\s/g,'').length<20){ showErr(t('errText')); return; }
    const resp=await fetch('/api/extract',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({quoteText,invoiceText})});
    const data=await resp.json();
    if(!resp.ok){ showErr(data&&data.error==='NO_KEY'?t('errKey'):t('errGeneric')); return; }
    lastResult=data; renderResult(data);
    $('importView').classList.add('hide'); $('resultView').classList.remove('hide');
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){ showErr(t('errGeneric')); }
  finally{ btn.disabled=false; btn.innerHTML=old; }
});
$('btnBack').addEventListener('click',()=>{ $('resultView').classList.add('hide'); $('importView').classList.remove('hide'); });

function renderResult(d){
  const inv=(typeof d.invoiceTTC==='number')?d.invoiceTTC:null;
  const q=(typeof d.quoteSupplierTTC==='number')?d.quoteSupplierTTC:null;
  $('invVal').textContent=inv==null?'—':eur(inv);
  $('quoteVal').textContent=q==null?'—':eur(q);
  $('supplierLine').innerHTML=d.supplier?`${t('supplier')} <b>${esc(d.supplier)}</b>`:'';
  $('resultNote').textContent=d.note||'';
  const card=$('resultCard'); card.classList.remove('ok','bad','warn');
  if(inv==null||q==null){ card.classList.add('warn'); $('resultBig').textContent=t('notFound'); }
  else{
    const gap=round2(inv-q);
    if(Math.abs(gap)<0.01){ card.classList.add('ok'); $('resultBig').textContent=t('match')+' — '+eur(inv)+' TTC'; }
    else if(gap>0){ card.classList.add('bad'); $('resultBig').textContent=t('gapHi').replace('{x}',eur(gap)); }
    else{ card.classList.add('bad'); $('resultBig').textContent=t('gapLo').replace('{x}',eur(Math.abs(gap))); }
  }
  resetFeedback();
}

/* ===== feedback ===== */
const FEEDBACK_ENDPOINT='https://script.google.com/a/macros/naboo.app/s/AKfycbyFFJZzR6HOfp05ommmHMrOnachUrG_SiTGq07Beu8at8vtiplqZlphDK1tZAKDHFcm/exec';
function resetFeedback(){
  const fb=$('feedback');
  fb.querySelector('.fb-q').classList.remove('hide'); fb.querySelector('.fb-btns').classList.remove('hide');
  $('fb_reason').classList.add('hide'); $('fb_thanks').classList.add('hide');
  $('fb_up').classList.remove('sel'); $('fb_down').classList.remove('sel'); $('fb_text').value='';
}
function fbShowThanks(){
  const fb=$('feedback');
  fb.querySelector('.fb-q').classList.add('hide'); fb.querySelector('.fb-btns').classList.add('hide');
  $('fb_reason').classList.add('hide'); $('fb_thanks').classList.remove('hide');
}
function sendFeedback(vote,reason){
  const payload={vote,reason:reason||''};
  if(FEEDBACK_ENDPOINT){ try{ fetch(FEEDBACK_ENDPOINT,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)}); }catch(e){} }
  fbShowThanks();
}
function fbSelect(which){ $('fb_up').classList.toggle('sel',which==='up'); $('fb_down').classList.toggle('sel',which==='down'); }
$('fb_up').addEventListener('click',()=>{ fbSelect('up'); $('fb_reason').classList.add('hide'); sendFeedback('good',''); });
$('fb_down').addEventListener('click',()=>{ fbSelect('down'); $('fb_reason').classList.remove('hide'); $('fb_text').focus(); });
$('fb_send').addEventListener('click',()=>{ const v=$('fb_text').value.trim(); if(!v){ $('fb_text').focus(); return; } sendFeedback('bad',v); });

applyStatic();
</script>
